name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} · py ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # One native lib serves all CPython 3.x (ctypes binding, not a C-API
        # extension), so a small Python spread is enough to prove the pure-Python
        # wrapper + the bundled lib load and run everywhere.
        python: ["3.8", "3.12"]
        exclude:
          # 3.8 is unavailable on the arm64 macos-latest runner image.
          - os: macos-latest
            python: "3.8"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build native cdylib + bundle it into the package
        run: python scripts/build_native.py

      - name: Install build tooling
        run: python -m pip install --upgrade pip build pytest

      - name: Install the package (editable, from the just-built lib)
        run: python -m pip install -e .

      - name: Run tests (from outside the source dir, against the install)
        shell: bash
        run: |
          mkdir -p /tmp/sasso-cwd
          cd /tmp/sasso-cwd
          python -m pytest "$GITHUB_WORKSPACE/tests" -v

      - name: Smoke test
        run: python -c "import sasso; print(sasso.__version__, sasso.compiler_version()); print(sasso.compile('.a{b:c}', style='compressed'))"
